name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run tests
        run: |
          cd backend
          pytest -v --tb=short

      - name: Run security audit
        run: |
          cd backend
          pip audit

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Run security audit
        run: |
          cd frontend
          npm audit

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    
    steps:
      - name: Test Backend API
        run: |
          echo "Testing Backend at Render..."
          curl -f https://c3-notes-api.onrender.com/api/health/ || exit 1
          echo "✓ Backend API is healthy"

      - name: Test Frontend
        run: |
          echo "Testing Frontend at Vercel..."
          curl -f https://c3-notes.vercel.app/ || exit 1
          echo "✓ Frontend is responding"

      - name: Test API Connectivity
        run: |
          echo "Testing API endpoints..."
          curl -f https://c3-notes-api.onrender.com/api/accounts/register/ -X OPTIONS || exit 1
          echo "✓ API is accessible"

  deployment-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: success()
    
    steps:
      - name: Pipeline Success
        run: |
          echo "✅ CI/CD Pipeline Passed!"
          echo ""
          echo "Status:"
          echo "  ✅ Backend tests passed"
          echo "  ✅ Frontend builds successfully"
          echo "  ✅ Smoke tests passed"
          echo ""
          echo "Deployed Services:"
          echo "  • Backend: https://c3-notes-api.onrender.com"
          echo "  • Frontend: https://c3-notes.vercel.app"
